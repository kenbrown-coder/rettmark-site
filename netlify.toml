# Static site — forms POST to Google Apps Script (not Netlify Forms).
# Redirects keep legacy double-extension thank-you URLs working if your script
# still points at success.html.html / unsubscribe.html.html.
#
# Turnstile site key (public): in Netlify → Site configuration → Environment variables,
# add TURNSTILE_SITE_KEY. Build injects it into js/turnstile-config.js (not stored in git).
#
# Authorize.Net checkout (env vars only — not baked into js/* for Netlify secret scan):
#   ANET_PUBLIC_CLIENT_KEY, ANET_API_LOGIN_ID → GET /.netlify/functions/anet-public-config
#   ANET_TRANSACTION_KEY (secret) → POST /.netlify/functions/anet-transaction
#   ANET_SANDBOX — true = developer sandbox API hosts (apitest/jstest). false = production hosts
#     (api/js.authorize.net). Use false for a live merchant account even if “Test Mode” is ON in the UI.
#   If Accept.js says invalid authentication, open in browser (production):
#   https://rettmarkfirearms.com/.netlify/functions/anet-verify-keys

[functions]
  directory = "netlify/functions"

# Serve this folder as the site root (must include css/, js/, assets/, *.html).
[build]
  publish = "."
  command = "npm run build"

[[redirects]]
  from = "/success.html.html"
  to = "/success.html"
  status = 301

[[redirects]]
  from = "/unsubscribe.html.html"
  to = "/unsubscribe.html"
  status = 301

# Pretty URLs (make /page work even when deploying as static HTML)
[[redirects]]
  from = "/cases"
  to = "/cases.html"
  status = 200

[[redirects]]
  from = "/bags"
  to = "/cases.html"
  status = 301

[[redirects]]
  from = "/shooting-glasses"
  to = "/shooting-glasses.html"
  status = 200

[[redirects]]
  from = "/firearms"
  to = "/firearms.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200

[[redirects]]
  from = "/cart"
  to = "/cart.html"
  status = 200

[[redirects]]
  from = "/checkout"
  to = "/checkout.html"
  status = 200

[[redirects]]
  from = "/order-success"
  to = "/order-success.html"
  status = 200

[[redirects]]
  from = "/success"
  to = "/success.html"
  status = 200

[[redirects]]
  from = "/unsubscribe"
  to = "/unsubscribe.html"
  status = 200

# Security headers (CSP allows Google Fonts, Turnstile, and Apps Script form POST).
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    # Accept.js POSTs card tokenization to https://api2.authorize.net/xml/v1/request.api (prod) or apitest (sandbox)—not api.authorize.net.
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self' https://challenges.cloudflare.com https://js.authorize.net https://jstest.authorize.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self' https://api.authorize.net https://api2.authorize.net https://apitest.authorize.net https://js.authorize.net https://jstest.authorize.net; form-action 'self' https://script.google.com https://script.googleusercontent.com; frame-src https://challenges.cloudflare.com; upgrade-insecure-requests"
