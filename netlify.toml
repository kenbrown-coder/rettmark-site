# Static site — forms POST to Google Apps Script (not Netlify Forms).
# Redirects keep legacy double-extension thank-you URLs working if your script
# still points at success.html.html / unsubscribe.html.html.
#
# Turnstile site key (public): in Netlify → Site configuration → Environment variables,
# add TURNSTILE_SITE_KEY. Build injects it into js/turnstile-config.js (not stored in git).

# Serve this folder as the site root (must include css/, js/, assets/, *.html).
[build]
  publish = "."
  command = "node scripts/inject-turnstile-config.cjs"

[[redirects]]
  from = "/success.html.html"
  to = "/success.html"
  status = 301

[[redirects]]
  from = "/unsubscribe.html.html"
  to = "/unsubscribe.html"
  status = 301

# Pretty URLs (make /page work even when deploying as static HTML)
[[redirects]]
  from = "/cases"
  to = "/cases.html"
  status = 200

[[redirects]]
  from = "/bags"
  to = "/cases.html"
  status = 301

[[redirects]]
  from = "/shooting-glasses"
  to = "/shooting-glasses.html"
  status = 200

[[redirects]]
  from = "/firearms"
  to = "/firearms.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200

[[redirects]]
  from = "/cart"
  to = "/cart.html"
  status = 200

[[redirects]]
  from = "/checkout"
  to = "/checkout.html"
  status = 200

[[redirects]]
  from = "/success"
  to = "/success.html"
  status = 200

[[redirects]]
  from = "/unsubscribe"
  to = "/unsubscribe.html"
  status = 200

# Security headers (CSP allows Google Fonts, Turnstile, and Apps Script form POST).
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self' https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self'; form-action 'self' https://script.google.com https://script.googleusercontent.com; frame-src https://challenges.cloudflare.com; upgrade-insecure-requests"
