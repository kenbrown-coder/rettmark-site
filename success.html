<!DOCTYPE html>
<html lang="en">
<head>
  <base href="/" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Submission Received | Rettmark Firearms</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@700&display=swap");
    :root{
      --bg:#050505;
      --text:#f2eee6;
      --muted:#b8aea0;
      --line:rgba(180,138,59,.32);
      --line-strong:rgba(180,138,59,.5);
      --button-bg:rgba(255,255,255,.02);
      --button-hover:rgba(255,255,255,.06);
      --font-home-title:"Libre Baskerville",Georgia,"Times New Roman",serif;
      --title-stroke:#e0301c;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:Georgia,"Times New Roman",serif}
    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      overflow:hidden;
      background:
        radial-gradient(circle at top, rgba(255,255,255,.03), transparent 34%),
        linear-gradient(180deg, #060606 0%, #030303 100%);
    }
    .wrap{
      position:relative;
      width:min(860px, 100%);
      text-align:center;
      padding:40px 34px 42px;
      border-top:1px solid var(--line);
      border-bottom:1px solid rgba(255,255,255,.05);
      background:linear-gradient(180deg, rgba(255,255,255,.014), rgba(255,255,255,.006));
      box-shadow:0 12px 44px rgba(0,0,0,.34);
      isolation:isolate;
      overflow:hidden;
    }
    .logo-hero{
      display:block;
      width:min(360px, 66%);
      margin:0 auto 18px;
      position:relative;
      filter:
        drop-shadow(0 18px 34px rgba(0,0,0,.42))
        brightness(1.08)
        contrast(1.04);
    }
    .subline{
      margin:0 auto 22px;
      width:min(150px, 40%);
      height:1px;
      background:linear-gradient(90deg, transparent, var(--line), transparent);
    }
    h1{
      margin:0 0 18px;
      font-family:var(--font-home-title);
      font-weight:700;
      font-size:clamp(2.35rem, 5.2vw, 4.2rem);
      line-height:1.05;
      letter-spacing:.02em;
      text-transform:uppercase;
      color:transparent;
      background-image:linear-gradient(135deg,#5c6574 0%,#2e333e 11%,#4a5260 24%,#9cabb8 36%,#252a32 47%,#5a6372 58%,#181c22 72%,#3d4654 86%,#6a7586 100%);
      background-size:100% 100%;
      -webkit-background-clip:text;
      background-clip:text;
      -webkit-text-stroke:1.35px var(--title-stroke);
      paint-order:stroke fill;
      filter:
        drop-shadow(0 0 5px rgba(255,95,55,.35))
        drop-shadow(0 0 12px rgba(200,40,25,.28))
        drop-shadow(0 2px 16px rgba(0,0,0,.52));
    }
    p{
      margin:0 auto;
      max-width:620px;
      font-size:clamp(1rem, 2vw, 1.12rem);
      line-height:1.78;
      color:var(--muted);
    }
    .actions{
      margin-top:34px;
      display:flex;
      justify-content:center;
    }
    .button{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:148px;
      padding:14px 26px;
      border:1px solid var(--line);
      border-radius:999px;
      color:var(--text);
      text-decoration:none;
      text-transform:uppercase;
      letter-spacing:.12em;
      font-size:.92rem;
      background:var(--button-bg);
      transition:all .2s ease;
    }
    .button:hover{
      background:var(--button-hover);
      border-color:var(--line-strong);
      transform:translateY(-1px);
    }
    @media (max-width:700px){
      .wrap{padding:30px 18px 32px;}
      .logo-hero{width:min(290px, 78%);margin:0 auto 14px;}
      h1{font-size:clamp(2rem, 9vw, 3rem);}
      p{max-width:94%;}
    }
  </style>
</head>
<body>
  <main class="wrap">
    <img class="logo-hero" src="assets/logo-rm.png" alt="Rettmark Firearms" />
    <div class="subline"></div>
    <h1>Submission Received</h1>
    <p>Your email has been submitted. Thank you for your interest in Rettmark Firearms. We will share updates as meaningful progress becomes available.</p>
    <div class="actions">
      <a class="button" href="index.html">Return</a>
    </div>
  </main>
</body>
</html>
